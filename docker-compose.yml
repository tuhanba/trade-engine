version: '3.8'

services:
  # 0. Redis (Sıcak Veri Deposu)
  redis:
    image: redis:alpine
    container_name: aurvex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # 1. Trade Engine (Botun Kalbi)
  engine:
    build: .
    container_name: aurvex_engine
    restart: unless-stopped
    command: python async_scalp_engine.py
    volumes:
      - ./:/app
    ports:
      - "8000:8000"  # Prometheus metrik portu
    environment:
      - TZ=UTC
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 1m
      timeout: 10s
      retries: 3

  # 2. Web Dashboard (Flask Arayüzü)
  dashboard:
    build: .
    container_name: aurvex_dashboard
    restart: unless-stopped
    command: python app.py
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    environment:
      - TZ=UTC
    depends_on:
      - engine
      - redis
    healthcheck:
      test: ["CMD", "python", "health_check.py"]
      interval: 1m
      timeout: 10s
      retries: 3


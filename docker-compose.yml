# AurvexAI — Production docker-compose
# Eklenenler: log rotasyonu (json-file max-size), redis healthcheck +
# depends_on condition, redis restart dayanıklılığı.
#
# Fix H (deployment sertleştirme):
#   - DB artık koddan AYRI bir named volume'da (db_data → /app/db). engine ve
#     dashboard AYNI volume'u paylaşır (paylaşılan SQLite state). Bind-mount
#     (./:/app) üzerinde iki-süreç SQLite kilidi bazı host FS'lerde (Docker
#     Desktop/macOS/Windows/ağ FS) güvenilmezdi.
#     ⚠️ YÜKSELTME NOTU: mevcut ./trading.db'yi bir kez db_data volume'una taşıyın:
#        docker run --rm -v "$PWD":/src -v aurvex_db_data:/dst alpine \
#          sh -c "cp /src/trading.db /dst/trading.db"
#   - Postgres servisi KALDIRILDI: runtime DB katmanı SQLite (SSoT); psycopg2
#     yalnız scripts/migrate_to_postgres.py'de (opt-in tek seferlik migrasyon).
#     Boşuna ayakta postgres + engine'in "depends_on postgres: healthy" beklemesi
#     boot'u geciktiriyordu. Gerçekten Postgres'e geçilecekse servis + bağımlılık
#     bilinçli geri eklenir.
#   - dashboard artık engine "service_healthy" (service_started değil) bekler —
#     engine hazır olmadan dashboard kalkıp Komuta Merkezi'nde yanlış "SORUN"
#     göstermesin.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # 0. Redis
  redis:
    image: redis:alpine
    container_name: aurvex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 1. Trade Engine
  engine:
    build: .
    container_name: aurvex_engine
    restart: unless-stopped
    command: python async_scalp_engine.py
    env_file: .env
    volumes:
      - ./:/app
      - db_data:/app/db            # Fix H: DB'yi koddan ayır (named volume)
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
      - DB_PATH=/app/db/trading.db  # Fix H: paylaşılan DB tek noktada
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "health_check.py", "--fast", "--role", "engine"]
      interval: 1m
      timeout: 30s
      retries: 3

  # 2. Web Dashboard
  dashboard:
    build: .
    container_name: aurvex_dashboard
    restart: unless-stopped
    command: python app.py
    env_file: .env
    volumes:
      - ./:/app
      - db_data:/app/db            # Fix H: engine ile AYNI DB volume'u
    ports:
      - "5000:5000"
    environment:
      - TZ=UTC
      - DB_PATH=/app/db/trading.db  # Fix H: engine ile aynı DB
    depends_on:
      engine:
        condition: service_healthy   # Fix H: service_started değil
      redis:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "health_check.py", "--fast", "--role", "dashboard"]
      interval: 1m
      timeout: 30s
      retries: 3

  # 3. Prometheus (engine:8000/metrics çeker) — Faz 6.6
  # NEDEN: Trading metrikleri zaten 8000'de Prometheus formatında. Prometheus
  # bunları kazır, Grafana görselleştirir. Trading UI'a dokunulmaz — yalnız
  # sistem/altyapı gözlemlenebilirliği (observability).
  prometheus:
    image: prom/prometheus:latest
    container_name: aurvex_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      engine:
        condition: service_started
    logging: *default-logging

  # 4. Grafana (hazır AurvexAI sistem dashboard'u provision edilir) — Faz 6.6
  grafana:
    image: grafana/grafana:latest
    container_name: aurvex_grafana
    restart: unless-stopped
    environment:
      - TZ=UTC
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-aurvex}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    logging: *default-logging

volumes:
  prometheus_data:
  grafana_data:
  db_data:                          # Fix H: koddan ayrı paylaşılan DB volume'u

version: '3.8'

services:
  # 0. Redis (Sıcak Veri Deposu)
  redis:
    image: redis:alpine
    container_name: aurvex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # 1. Trade Engine (Botun Kalbi)
  engine:
    build: .
    container_name: aurvex_engine
    restart: unless-stopped
    command: python async_scalp_engine.py
    volumes:
      - ./:/app
      - db_data:/app/db  # DB'yi kalıcı (persistent) yapıyoruz
    ports:
      - "8000:8000"  # Prometheus metrik portu
    environment:
      - TZ=UTC
    depends_on:
      - redis

  # 2. Web Dashboard (Flask Arayüzü)
  dashboard:
    build: .
    container_name: aurvex_dashboard
    restart: unless-stopped
    command: python app.py
    volumes:
      - ./:/app
      - db_data:/app/db  # Engine ile aynı DB'ye bağlanır (WAL modu sayesinde çakışmaz)
    ports:
      - "5001:5000"
    environment:
      - TZ=UTC
    depends_on:
      - engine
      - redis

volumes:
  db_data:

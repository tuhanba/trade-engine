# AurvexAI — Production docker-compose
# Eklenenler: log rotasyonu (json-file max-size), redis healthcheck +
# depends_on condition, redis restart dayanıklılığı.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # 0. Redis
  redis:
    image: redis:alpine
    container_name: aurvex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 1. Trade Engine
  engine:
    build: .
    container_name: aurvex_engine
    restart: unless-stopped
    command: python async_scalp_engine.py
    env_file: .env
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "health_check.py", "--fast", "--role", "engine"]
      interval: 1m
      timeout: 30s
      retries: 3

  # 2. Web Dashboard
  dashboard:
    build: .
    container_name: aurvex_dashboard
    restart: unless-stopped
    command: python app.py
    env_file: .env
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    environment:
      - TZ=UTC
    depends_on:
      engine:
        condition: service_started
      redis:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "health_check.py", "--fast", "--role", "dashboard"]
      interval: 1m
      timeout: 30s
      retries: 3

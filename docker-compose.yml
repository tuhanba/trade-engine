# AurvexAI — Production docker-compose
# Eklenenler: log rotasyonu (json-file max-size), redis healthcheck +
# depends_on condition, redis restart dayanıklılığı.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  # 0. Redis
  redis:
    image: redis:alpine
    container_name: aurvex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aurvex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurvex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurvexpass}
      POSTGRES_DB: ${POSTGRES_DB:-aurvex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurvex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Trade Engine
  engine:
    build: .
    container_name: aurvex_engine
    restart: unless-stopped
    command: python async_scalp_engine.py
    env_file: .env
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "health_check.py", "--fast", "--role", "engine"]
      interval: 1m
      timeout: 30s
      retries: 3

  # 2. Web Dashboard
  dashboard:
    build: .
    container_name: aurvex_dashboard
    restart: unless-stopped
    command: python app.py
    env_file: .env
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    environment:
      - TZ=UTC
    depends_on:
      engine:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "health_check.py", "--fast", "--role", "dashboard"]
      interval: 1m
      timeout: 30s
      retries: 3

  # 3. Prometheus (engine:8000/metrics çeker) — Faz 6.6
  # NEDEN: Trading metrikleri zaten 8000'de Prometheus formatında. Prometheus
  # bunları kazır, Grafana görselleştirir. Trading UI'a dokunulmaz — yalnız
  # sistem/altyapı gözlemlenebilirliği (observability).
  prometheus:
    image: prom/prometheus:latest
    container_name: aurvex_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      engine:
        condition: service_started
    logging: *default-logging

  # 4. Grafana (hazır AurvexAI sistem dashboard'u provision edilir) — Faz 6.6
  grafana:
    image: grafana/grafana:latest
    container_name: aurvex_grafana
    restart: unless-stopped
    environment:
      - TZ=UTC
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-aurvex}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    logging: *default-logging

volumes:
  prometheus_data:
  grafana_data:
  postgres_data:

/root/trade-engine/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        # Servislerin yeni log dosyasına geçmesi için sinyal gönder
        systemctl kill --kill-who=main --signal=USR1 aurvex-bot.service     2>/dev/null || true
        systemctl kill --kill-who=main --signal=USR1 aurvex-dashboard.service 2>/dev/null || true
    endscript
}

/root/trade-engine/logs/bot-stderr.log
/root/trade-engine/logs/dashboard-stderr.log
/root/trade-engine/logs/n8n-bridge-stderr.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    size 5M
    create 0640 root root
}
